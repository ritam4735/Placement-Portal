{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">
<i class="bi bi-pencil-square"></i>
Edit Drive
</h2>


<div class="glass p-4">

<form method="POST">

<div class="mb-3">
<label class="form-label">Job Title</label>
<input
  name="title"
  class="form-control"
  value="{{ drive.job_title }}"
  required>
</div>

<div class="mb-3">
<label class="form-label">Job Description</label>
<textarea
  name="desc"
  class="form-control"
  rows="4">{{ drive.job_description }}</textarea>
</div>

<div class="mb-3">
<label class="form-label">Eligibility Criteria</label>
<input
  name="eligibility"
  class="form-control"
  value="{{ drive.eligibility }}">
</div>

<div class="mb-3">
<label class="form-label">Application Deadline</label>
<input
  type="date"
  name="deadline"
  class="form-control"
  value="{{ drive.deadline }}"
  required>
</div>

<div class="d-flex gap-2">

<button class="btn btn-success">
<i class="bi bi-check-lg"></i>
Save Changes
</button>

<a href="/company" class="btn btn-secondary">
<i class="bi bi-x-lg"></i>
Cancel
</a>

</div>

</form>

</div>

{% endblock %}
